name: SCA - OWASP Dependency Check

on:
  push:
    branches: [ "main", "master" ]

jobs:
  analyze:
    runs-on: ubuntu-latest

    steps:

    # 1. Checkout source
    - name: Checkout code
      uses: actions/checkout@v4

    # 2. Setup Java
    - name: Setup Java
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 17

    # 3. Build project để tải dependencies
    - name: Build with Maven
      run: mvn clean package -DskipTests

    # 4. Download OWASP Dependency Check
    - name: Download Dependency Check
      run: |
        wget https://github.com/jeremylong/DependencyCheck/releases/download/v9.0.9/dependency-check-9.0.9-release.zip
        unzip dependency-check-9.0.9-release.zip

    # 5. Run scan
    - name: Run Dependency Check
      run: |
        ./dependency-check/bin/dependency-check.sh \
        --project "microShop" \
        --scan . \
        --format HTML \
        --out reports \
        --nvdApiKey ${{ secrets.NVD_API_KEY }}

    # 6. Upload report
    - name: Upload report
      uses: actions/upload-artifact@v4
      with:
        name: dependency-check-report
        path: reports/dependency-check-report.html
