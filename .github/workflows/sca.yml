name: SCA - OWASP Dependency Check

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  analyze:
    name: Analyze Dependencies (SCA)
    runs-on: ubuntu-latest

    steps:

    # 1. Checkout source code từ GitHub
    - name: Checkout source code
      uses: actions/checkout@v4


    # 2. Cài Java 21 (bắt buộc cho project microShop)
    - name: Setup Java 21
      uses: actions/setup-java@v4
      with:
        distribution: temurin
        java-version: 21


    # 3. Build project bằng Maven
    - name: Build project with Maven
      run: mvn clean install -DskipTests


    # 4. Download OWASP Dependency Check tool
    - name: Download OWASP Dependency Check
      run: |
        wget https://github.com/jeremylong/DependencyCheck/releases/download/v9.0.9/dependency-check-9.0.9-release.zip
        unzip dependency-check-9.0.9-release.zip


    # 5. Run SCA scan using NVD API Key
    - name: Run Dependency Check Scan
      run: |
        dependency-check/bin/dependency-check.sh \
        --project "microShop" \
        --scan "." \
        --format "HTML" \
        --out "reports" \
        --nvdApiKey "${{ secrets.NVD_API_KEY }}" \
        --nvdApiDelay 8000 \
        --disableAssembly \
        --disableNodeJS


    # 6. Upload report để tải về
    - name: Upload Dependency Check Report
      uses: actions/upload-artifact@v4
      with:
        name: Dependency-Check-Report
        path: reports
